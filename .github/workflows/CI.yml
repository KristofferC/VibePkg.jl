name: CI

on:
  push:
    branches: [master]
    tags: ['*']
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  test:
    name: Julia ${{ matrix.version }} - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    permissions:
      id-token: write
      contents: read
    strategy:
      fail-fast: false
      matrix:
        version: ['1.12', 'pre', 'nightly']
        os: [ubuntu-latest]
        include:
          - version: '1.12'
            os: macos-latest
          - version: '1.12'
            os: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: ${{ matrix.version }}
      - uses: julia-actions/cache@v3
      # Bootstrap with Pkg: instantiating the test project installs the
      # whole test closure — including VibePkg's own deps via the path
      # source — so VibePkg can load and test itself.
      - name: Instantiate
        run: julia --project=test -e 'using Pkg; Pkg.instantiate()'
      - name: VibePkg.test()
        run: julia --project=. -e 'using VibePkg; VibePkg.test(coverage=true)'
      - uses: julia-actions/julia-processcoverage@v1
      - uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          use_oidc: true
          fail_ci_if_error: true

  docs:
    name: Documentation
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: julia-actions/setup-julia@v3
        with:
          version: '1.12'
      - uses: julia-actions/cache@v3
      - name: Instantiate VibePkg
        run: julia --project=. -e 'using Pkg; Pkg.instantiate()'
      - name: Instantiate docs with VibePkg
        run: julia --project=. -e 'using VibePkg; VibePkg.activate("docs"); VibePkg.instantiate()'
      - run: julia --project=docs docs/make.jl
        env:
          CI: 'true'
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
